const importAll=file=>new Promise((res,rej)=>{
  const r=new FileReader();
  r.onload=e=>{try{res(JSON.parse(e.target.result))}catch{rej(new Error('JSON inválido'))}};
  r.onerror=()=>rej(new Error('Erro'));r.readAsText(file);
});

// ── API Anthropic ────────────────────────────────────────────────────────────
const readBase64=file=>new Promise((res,rej)=>{
  const r=new FileReader();
  r.onload=()=>res(r.result.split(',')[1]);
  r.onerror=()=>rej(new Error('Falha ao ler arquivo'));
  r.readAsDataURL(file);
});

async function callClaude(apiKey,messages,system,maxTokens=2000){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTokens,system,messages}),
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`Erro HTTP ${res.status}`);}
  const d=await res.json();
  return d.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
}

function parseJSON(raw){return JSON.parse(raw.replace(/```json|```/g,'').trim())}

function detectGroup(tumor=''){
  const t=tumor.toLowerCase();
  if(t.includes('mama')||t.includes('breast'))return'mama';
  if(t.includes('pulm')||t.includes('lung')||t.includes('nsclc')||t.includes('sclc'))return'pulmao';
  if(t.includes('color')||t.includes('retal')||t.includes('colon'))return'colorretal';
  if(t.includes('próst')||t.includes('prost'))return'prostata';
  if(t.includes('hemato')||t.includes('leucem')||t.includes('linfom')||t.includes('mielom'))return'hemato';
  if(t.includes('gástri')||t.includes('gastric')||t.includes('gej'))return'gastrico';
  if(t.includes('ovário')||t.includes('ovario')||t.includes('ovarian'))return'ovario';
  if(t.includes('fígado')||t.includes('figado')||t.includes('hcc')||t.includes('biliar'))return'figado';
  if(t.includes('rim')||t.includes('renal')||t.includes('bexiga'))return'rim';
  if(t.includes('snc')||t.includes('gliom')||t.includes('cerebr'))return'snc';
  if(t.includes('melan')||t.includes('pele'))return'pele';
  return'outros';
}

// ── RichText ─────────────────────────────────────────────────────────────────
function RichText({text,highlights,topic}){
  if(!text)return null;
  const applyHL=str=>{
    const hls=(highlights||[]).filter(h=>h.topic===topic);
    if(!hls.length)return<span>{str}</span>;
    let parts=[{text:str,hl:false,color:null}];
    hls.forEach(h=>{
      parts=parts.flatMap(p=>{
        if(p.hl)return[p];
        const idx=p.text.indexOf(h.text);
        if(idx===-1)return[p];
        return[{text:p.text.slice(0,idx),hl:false},{text:h.text,hl:true,color:h.color},{text:p.text.slice(idx+h.text.length),hl:false}].filter(x=>x.text);
      });
    });
    return parts.map((p,i)=>p.hl?<mark key={i} style={{background:p.color.bg,borderBottom:`2px solid ${p.color.border}`,borderRadius:3,padding:'0 1px'}}>{p.text}</mark>:<span key={i}>{p.text}</span>);
  };
  const isSep=l=>/^\|[\s\-|:]+\|$/.test(l.trim());
  const isRow=l=>l.trim().startsWith('|')&&l.trim().endsWith('|');
  const parseRow=l=>l.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
  const lines=text.split('\n');const els=[];let tBuf=[];let i=0;
  const flushT=()=>{
    const rows=tBuf.filter(l=>!isSep(l));
    if(rows.length<2){tBuf.forEach((l,j)=>els.push(<p key={`pt${i}${j}`} style={{fontSize:13,lineHeight:1.75,marginBottom:3,color:'#444',fontFamily:"'Lora',serif"}}>{applyHL(l)}</p>));tBuf=[];return;}
    const hdrs=parseRow(rows[0]);const body=rows.slice(1);
    els.push(<div key={`t${i}`} style={{overflowX:'auto',margin:'10px 0 14px'}}>
      <table style={{borderCollapse:'collapse',fontSize:12,width:'100%'}}>
        <thead><tr>{hdrs.map((h,ci)=><th key={ci} style={{padding:'7px 11px',background:'#1a1a2e',color:'#fff',textAlign:'left',fontSize:10,fontFamily:"'DM Mono',monospace",borderRight:'1px solid #2a2a3e',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
        <tbody>{body.map((row,ri)=>{const cells=parseRow(row);return<tr key={ri} style={{background:ri%2===0?'#fafaf8':'#fff'}}>{cells.map((cell,ci)=><td key={ci} style={{padding:'6px 11px',borderBottom:'1px solid #f0f0ec',borderRight:'1px solid #f0f0ec',fontSize:12,color:'#333',lineHeight:1.5,fontFamily:ci===0?"'DM Mono',monospace":"'Lora',serif",fontWeight:ci===0?600:400}}>{applyHL(cell)}</td>)}</tr>;})}
        </tbody>
      </table>
    </div>);tBuf=[];
  };
  while(i<lines.length){
    const l=lines[i];
    if(isRow(l)){tBuf.push(l);}
    else{
      if(tBuf.length)flushT();
      const t=l.trim();
      if(!t){els.push(<div key={`br${i}`} style={{height:5}}/>);}
      else if(/^[-•▸]\s/.test(t)){els.push(<div key={`li${i}`} style={{display:'flex',gap:7,marginBottom:3}}><span style={{color:'#1E88E5',flexShrink:0,marginTop:2,fontSize:11}}>▸</span><span style={{fontSize:13,lineHeight:1.75,color:'#333',fontFamily:"'Lora',serif"}}>{applyHL(t.replace(/^[-•▸]\s/,''))}</span></div>);}
      else{els.push(<p key={`p${i}`} style={{fontSize:13,lineHeight:1.8,color:'#333',marginBottom:3,fontFamily:"'Lora',serif"}}>{applyHL(t)}</p>);}
    }i++;
  }
  if(tBuf.length)flushT();
  return<div>{els}</div>;
}

// ── TopicBlock ───────────────────────────────────────────────────────────────
const HL_COLORS=[
  {id:'hl-y',bg:'#FFF59D',border:'#F9A825'},{id:'hl-b',bg:'#BBDEFB',border:'#1E88E5'},
  {id:'hl-g',bg:'#C8E6C9',border:'#43A047'},{id:'hl-o',bg:'#FFE0B2',border:'#E65100'},
  {id:'hl-r',bg:'#FFCDD2',border:'#D32F2F'},
];
function TopicBlock({icon,name,colorHex,content,index,onHL,highlights}){
  const[open,setOpen]=useState(index<3);
  const[hlC,setHlC]=useState('hl-y');
  const handleMU=()=>{
    const sel=window.getSelection();if(!sel||sel.isCollapsed)return;
    const text=sel.toString().trim();if(!text||text.length>400)return;
    const color=HL_COLORS.find(c=>c.id===hlC);
    onHL({text,color,topic:name});sel.removeAllRanges();
  };
  return(
    <div style={{marginBottom:12,border:`1.5px solid ${colorHex}22`,borderLeft:`4px solid ${colorHex}`,borderRadius:'0 10px 10px 0',background:'#fff',overflow:'hidden'}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'11px 16px',background:'none',border:'none',textAlign:'left'}}>
        <span style={{fontSize:15}}>{icon}</span>
        <span style={{fontSize:11,fontWeight:700,color:'#888',letterSpacing:1,textTransform:'uppercase',fontFamily:"'DM Mono',monospace"}}>{String(index+1).padStart(2,'0')}</span>
        <span style={{fontSize:13,fontWeight:600,color:'#1a1a2e',flex:1,fontFamily:"'Lora',serif"}}>{name}</span>
        <span style={{width:8,height:8,borderRadius:'50%',background:colorHex,flexShrink:0}}/>
        <span style={{fontSize:11,color:'#aaa'}}>{open?'▲':'▼'}</span>
      </button>
      {open&&<>
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'2px 16px 8px 44px'}}>
          <span style={{fontSize:10,color:'#bbb',fontFamily:"'DM Mono',monospace",marginRight:4}}>GRIFO:</span>
          {HL_COLORS.map(c=><button key={c.id} onClick={()=>setHlC(c.id)} style={{width:15,height:15,borderRadius:'50%',background:c.bg,border:`2px solid ${hlC===c.id?c.border:'transparent'}`,flexShrink:0}}/>)}
        </div>
        <div onMouseUp={handleMU} style={{padding:'4px 18px 14px 44px',userSelect:'text',cursor:'text'}}>
          <RichText text={content} highlights={highlights} topic={name}/>
        </div>
      </>}
    </div>
  );
}

// ── MindMap ──────────────────────────────────────────────────────────────────
function MindMap({topics,article,groupColor}){
  if(!topics?.length)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:160,color:'#bbb',fontSize:12,fontFamily:"'DM Mono',monospace"}}>Analise um artigo para ver o mapa</div>;
  const cx=155,cy=110;
  const nodes=topics.slice(0,8).map((_,i)=>{
    const angle=(i/8)*Math.PI*2-Math.PI/2;
    return{x:cx+Math.cos(angle)*85,y:cy+Math.sin(angle)*65,icon:TOPIC_ICONS[i],label:TOPIC_NAMES[i].split(' ')[0],color:TOPIC_COLORS[i]};
  });
  return<svg width="100%" viewBox="0 0 310 220" style={{overflow:'visible'}}>
    {nodes.map((n,i)=><line key={i} x1={cx} y1={cy} x2={n.x} y2={n.y} stroke={n.color} strokeWidth={1.2} strokeOpacity={0.4} strokeDasharray="3,3"/>)}
    <circle cx={cx} cy={cy} r={24} fill={groupColor||'#1a1a2e'}/>
    <text x={cx} y={cy-2} textAnchor="middle" fill="white" fontSize={9} fontFamily="Lora,serif" fontWeight="bold">{article?.split(' ')[0]||'Estudo'}</text>
    <text x={cx} y={cy+11} textAnchor="middle" fill="rgba(255,255,255,0.5)" fontSize={7} fontFamily="DM Mono,monospace">ESTUDO</text>
    {nodes.map((n,i)=><g key={i}>
      <circle cx={n.x} cy={n.y} r={16} fill={n.color} fillOpacity={0.12} stroke={n.color} strokeWidth={1.5}/>
      <text x={n.x} y={n.y-1} textAnchor="middle" fontSize={10}>{n.icon}</text>
      <text x={n.x} y={n.y+11} textAnchor="middle" fill={n.color} fontSize={6} fontFamily="DM Mono,monospace" fontWeight="bold">{n.label.toUpperCase().slice(0,8)}</text>
    </g>)}
  </svg>;
}

// ── WikiSection ──────────────────────────────────────────────────────────────
function WikiSection({apiKey}){
  const[articles,setArticles]=useState(()=>loadArticles());
  const[selected,setSelected]=useState(null);
  const[topics,setTopics]=useState(null);
  const[notes,setNotes]=useState({});
  const[highlights,setHighlights]=useState({});
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const[activeTab,setActiveTab]=useState('mapa');
  const[dragOver,setDragOver]=useState(false);
  const[expanded,setExpanded]=useState({});
  const[view,setView]=useState('resumo');
  const[matrixGroup,setMatrixGroup]=useState('all');
  const fileRef=useRef(null);

  useEffect(()=>{saveArticles(articles);},[articles]);

  const currentArt=articles.find(a=>a.id===selected);
  const currentGrp=currentArt?TUMOR_GROUPS.find(g=>g.id===currentArt.group):null;
  const currentHL=highlights[selected]||[];
  const allHL=Object.entries(highlights).flatMap(([id,hls])=>{const a=articles.find(x=>x.id===Number(id));return hls.map(h=>({...h,artTitle:a?.title||''}));});

  const byGroup=TUMOR_GROUPS.reduce((acc,g)=>{acc[g.id]=articles.filter(a=>a.group===g.id);return acc;},{});
  const usedGroups=TUMOR_GROUPS.filter(g=>byGroup[g.id].length>0);

  const onHL=useCallback(hl=>{if(!selected)return;setHighlights(p=>({...p,[selected]:[...(p[selected]||[]),hl]}));},[selected]);

  const processPDF=useCallback(async file=>{
    if(!apiKey){setError('Configure sua API Key nas configurações ⚙️');return;}
    setLoading(true);setError('');
    try{
      const base64=await readBase64(file);
      const fileName=file.name.replace(/\.pdf$/i,'');
      const extractRaw=await callClaude(apiKey,[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}},
        {type:'text',text:'Extraia TODO o texto deste PDF preservando números, tabelas e estatísticas. Retorne apenas o texto bruto.'},
      ]}],'Você é um extrator de texto de artigos científicos. Extraia o texto completo fiel ao documento.',3000);
      if(!extractRaw||extractRaw.length<100)throw new Error('Texto insuficiente no PDF.');

      const parseRaw=await callClaude(apiKey,[{role:'user',content:`TEXTO DO ARTIGO — USE APENAS ESTE TEXTO, SEM CONHECIMENTO EXTERNO:
---
${extractRaw.slice(0,8000)}
---
Analise com máximo rigor. Se não estiver no texto: "Não informado no documento."
Responda APENAS em JSON puro:
{"title":"Nome resumido (Ano)","tumor":"sítio tumoral","scenario":"cenário clínico detalhado","topics":["t1","t2","t3","t4","t5","t6","t7","t8","t9","t10"]}

TÓPICO 1 — TÍTULO: nome resumido (Ano) | título completo | revista e ano
TÓPICO 2 — RACIONAL 🔬: contexto clínico, lacuna de conhecimento, justificativa das intervenções
TÓPICO 3 — DESENHO 🧪: fase, tipo, randomização, braços com doses exatas, estratificações, centros, seguimento
TÓPICO 4 — POPULAÇÃO 👥: total por braço. Tabela: | Característica | Braço A | Braço B | com idade, PS, biomarcadores, SNC, mutações. Critérios inclusão/exclusão.
TÓPICO 5 — ENDPOINTS 🎯: definição conceitual exata de cada endpoint primário e secundário. Hipótese estatística.
TÓPICO 6 — RESULTADOS 📊: tabela | Endpoint | Braço A | Braço B | HR (IC95%) | p-valor | para todos desfechos. Endpoint primário atingido?
TÓPICO 7 — SUBGRUPOS 🧠: tabela | Subgrupo | HR (IC95%) | Favorece | para SNC, PD-L1, mutações. Quais mais se beneficiaram?
TÓPICO 8 — TOXICIDADE ⚠️: tabela | Evento Grau≥3 | Braço A (%) | Braço B (%) |. Descontinuações, reduções de dose, óbitos.
TÓPICO 9 — CRÍTICAS 🧐: vieses, limitações, generalização, sub-representação de grupos.
TÓPICO 10 — IMPACTO 🩺💡: novo padrão? Ganho absoluto? Consistência nos subgrupos? Aplicabilidade brasil.`}],
      'Você é oncologista sênior. Analise SOMENTE o texto fornecido. Seja maximamente rigoroso. Use tabelas markdown sempre que houver dados comparativos. Nunca invente dados.',4000);

      const parsed=parseJSON(parseRaw);
      const group=detectGroup(parsed.tumor||'');
      const newArt={id:Date.now(),title:parsed.title||fileName,tumor:parsed.tumor||'',scenario:parsed.scenario||'',date:new Date().toISOString().slice(0,10),group,topics:parsed.topics};
      setArticles(p=>[newArt,...p]);
      setSelected(newArt.id);setTopics(newArt.topics);
      setView('resumo');setActiveTab('mapa');
      setExpanded(p=>({...p,[group]:true}));
    }catch(e){setError('Erro: '+(e.message||'Verifique o PDF e a API Key'));}
    setLoading(false);
  },[apiKey]);

  const selectArt=a=>{setSelected(a.id);setTopics(a.topics||null);setView('resumo');setActiveTab('mapa');};

  const matrixArts=matrixGroup==='all'?articles.filter(a=>a.topics):articles.filter(a=>a.topics&&a.group===matrixGroup);
  const COMPARE_ROWS=['Título / Fase','Braços / Intervenção','Tamanho Amostral','Endpoint Primário','HR / IC95%','p-valor','Subgrupo Destaque','Toxicidade Grau≥3','Limitação Principal','Impacto Clínico'];

  return<div style={{display:'flex',flex:1,overflow:'hidden'}}>
    {/* Sidebar artigos */}
    <aside style={{width:220,background:'#fff',borderRight:'1.5px solid #e8e8e4',display:'flex',flexDirection:'column',flexShrink:0,overflow:'hidden'}}>
      <div style={{padding:'12px 12px 10px',borderBottom:'1px solid #f0f0ec',flexShrink:0}}>

// ── NoteMindMap — gera mapa mental a partir do conteúdo da nota ─────────────
function NoteMindMap({note}){
  const grp=TUMOR_GROUPS.find(g=>g.id===note.tumor);
  const centerColor=grp?.color||'#1a1a2e';

  // Extrai pontos principais do corpo da nota
  const extractNodes=useMemo(()=>{
    const lines=note.body.split('\n').filter(l=>l.trim());
    const nodes=[];
    // Pega título, tema, cenário como nós fixos
    if(note.theme) nodes.push({label:note.theme,color:'#43A047',icon:'🎯'});
    if(note.scenario) nodes.push({label:note.scenario.slice(0,12),color:'#1E88E5',icon:'🏥'});
    // Extrai linhas com bullet points
    lines.forEach(l=>{
      const t=l.trim().replace(/^[-•▸]\s/,'');
      if(/^[-•▸]\s/.test(l.trim())&&t.length>3&&t.length<40&&nodes.length<7){
        nodes.push({label:t.slice(0,18),color:'#5C6BC0',icon:'▸'});
      }
    });
    // Extrai tags como nós
    if(note.tags){
      note.tags.split(',').slice(0,3).forEach(tag=>{
        const t=tag.trim();
        if(t&&nodes.length<8) nodes.push({label:t.slice(0,15),color:'#E65100',icon:'🏷️'});
      });
    }
    // Se poucos nós, pega primeiras palavras de parágrafos
    lines.forEach(l=>{
      const t=l.trim();
      if(!t.startsWith('|')&&t.length>10&&nodes.length<7){
        const words=t.split(' ').slice(0,3).join(' ');
        if(!nodes.find(n=>n.label===words))
          nodes.push({label:words,color:'#795548',icon:'📝'});
      }
    });
    return nodes.slice(0,8);
  },[note]);

  const cx=160,cy=120;
  const total=extractNodes.length||1;

  return<svg width="100%" viewBox="0 0 320 240" style={{overflow:'visible'}}>
    {extractNodes.map((n,i)=>{
      const angle=(i/total)*Math.PI*2-Math.PI/2;
      const x=cx+Math.cos(angle)*95;
      const y=cy+Math.sin(angle)*75;
      return<line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={n.color} strokeWidth={1.5} strokeOpacity={0.35} strokeDasharray="4,3"/>;
    })}
    {/* Centro */}
    <circle cx={cx} cy={cy} r={30} fill={centerColor}/>
    <text x={cx} y={cy-5} textAnchor="middle" fill="white" fontSize={9} fontFamily="Lora,serif" fontWeight="bold">
      {note.title.slice(0,12)}
    </text>
    {grp&&<text x={cx} y={cy+9} textAnchor="middle" fill="rgba(255,255,255,0.7)" fontSize={10}>{grp.emoji}</text>}
    {/* Nós */}
    {extractNodes.map((n,i)=>{
      const angle=(i/total)*Math.PI*2-Math.PI/2;
      const x=cx+Math.cos(angle)*95;
      const y=cy+Math.sin(angle)*75;
      return<g key={i}>
        <circle cx={x} cy={y} r={20} fill={n.color} fillOpacity={0.12} stroke={n.color} strokeWidth={1.5}/>
        <text x={x} y={y-3} textAnchor="middle" fontSize={10}>{n.icon}</text>
        <text x={x} y={y+10} textAnchor="middle" fill={n.color} fontSize={6} fontFamily="DM Mono,monospace" fontWeight="bold">
          {n.label.toUpperCase().slice(0,10)}
        </text>
      </g>;
    })}
    {extractNodes.length===0&&<text x={cx} y={cy+50} textAnchor="middle" fill="#bbb" fontSize={10} fontFamily="DM Mono,monospace">Adicione conteúdo à nota</text>}
  </svg>;
}

function NoteCard({note,onEdit,onDelete,onToggleStar}){
  const[expanded,setExpanded]=useState(false);
  const[showMap,setShowMap]=useState(false);
  const color=CARD_COLORS.find(c=>c.id===note.color)||CARD_COLORS[0];
  const grp=TUMOR_GROUPS.find(g=>g.id===note.tumor);
  const src=SOURCES.find(s=>s.id===note.source);
  const imp=IMPORTANCE.find(i=>i.id===note.importance);
  const tags=note.tags?note.tags.split(',').map(t=>t.trim()).filter(Boolean):[];
  return<div className="card" style={{border:`1.5px solid ${color.border}40`,borderLeft:`4px solid ${color.border}`,borderRadius:'0 12px 12px 0',background:'#fff',marginBottom:10,overflow:'hidden'}}>
    <div style={{padding:'12px 14px 9px',background:color.bg+'60',cursor:'pointer'}} onClick={()=>setExpanded(e=>!e)}>
      <div style={{display:'flex',alignItems:'flex-start',gap:9}}>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:6,flexWrap:'wrap'}}>
            {imp&&<span style={{fontSize:11}}>{imp.label.split(' ')[0]}</span>}
            {grp&&<span className="tag" style={{background:grp.color+'15',color:grp.color}}>{grp.emoji} {grp.label}</span>}
            {note.scenario&&<span className="tag" style={{background:'#f0f0ec',color:'#666'}}>{note.scenario}</span>}
            {note.theme&&<span className="tag" style={{background:'#e8f5e9',color:'#2E7D32'}}>#{note.theme}</span>}
            {src&&<span className="tag" style={{background:src.color+'12',color:src.color}}>{src.emoji} {src.label}</span>}
          </div>
          <div style={{fontSize:13,fontWeight:700,color:'#1a1a2e',lineHeight:1.4,fontFamily:"'Lora',serif"}}>{note.title}</div>
          {tags.length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:5}}>{tags.map((t,i)=><span key={i} style={{fontSize:10,color:'#999',background:'#f5f5f0',padding:'1px 6px',borderRadius:20,fontFamily:"'DM Mono',monospace"}}>#{t}</span>)}</div>}
        </div>
        <div style={{display:'flex',gap:3,flexShrink:0,alignItems:'center'}}>
          <button onClick={e=>{e.stopPropagation();onToggleStar(note.id);}} style={{fontSize:13,background:'none',border:'none',color:note.starred?'#F9A825':'#ccc',padding:'2px 3px'}}>★</button>
          <button onClick={e=>{e.stopPropagation();onEdit(note);}} style={{fontSize:12,background:'none',border:'none',color:'#aaa',padding:'2px 3px'}}>✏️</button>
          <button onClick={e=>{e.stopPropagation();onDelete(note.id);}} style={{fontSize:14,background:'none',border:'none',color:'#ccc',padding:'2px 3px'}}>×</button>
          <span style={{fontSize:10,color:'#ccc',marginLeft:2}}>{expanded?'▲':'▼'}</span>
        </div>
      </div>
    </div>
    {expanded&&<div style={{padding:'12px 16px 14px'}}>
      <RichText text={note.body}/>
      {/* Botão mapa mental */}
      <button onClick={e=>{e.stopPropagation();setShowMap(m=>!m);}}
        style={{marginTop:14,padding:'6px 14px',background:showMap?grp?.color||'#1a1a2e':'#f5f5f0',color:showMap?'#fff':'#666',border:'none',borderRadius:20,fontSize:11,fontFamily:"'DM Mono',monospace",cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
        🗺️ {showMap?'Fechar Mapa Mental':'Ver Mapa Mental'}
      </button>
      {showMap&&<div style={{marginTop:12,background:'#fafaf8',borderRadius:12,padding:14,border:'1.5px solid #f0f0ec'}}>
        <div style={{fontSize:9,color:'#bbb',fontFamily:"'DM Mono',monospace",letterSpacing:1.5,textTransform:'uppercase',marginBottom:8}}>MAPA MENTAL · {note.title}</div>
        <NoteMindMap note={note}/>
        <div style={{fontSize:10,color:'#bbb',fontFamily:"'DM Mono',monospace",marginTop:8,lineHeight:1.6}}>
          Gerado a partir do conteúdo da nota · sem uso de créditos
        </div>
      </div>}
      <div style={{fontSize:10,color:'#ccc',marginTop:10,fontFamily:"'DM Mono',monospace"}}>{note.date}</div>
    </div>}
  </div>;
}

function NotesSection(){
  const[notes,setNotes]=useState(()=>loadNotes());
  const[view,setView]=useState('list');
  const[editing,setEditing]=useState(null);
  const[filters,setFilters]=useState({});
  const[sortBy,setSortBy]=useState('date');

  useEffect(()=>{saveNotes(notes);},[notes]);

  const saveNote=note=>{setNotes(prev=>{const idx=prev.findIndex(n=>n.id===note.id);if(idx>=0){const next=[...prev];next[idx]=note;return next;}return[note,...prev];});setView('list');setEditing(null);};
  const deleteNote=id=>{if(window.confirm('Apagar esta nota?'))setNotes(prev=>prev.filter(n=>n.id!==id));};
  const toggleStar=id=>setNotes(prev=>prev.map(n=>n.id===id?{...n,starred:!n.starred}:n));

  const filtered=useMemo(()=>{
    let list=view==='starred'?notes.filter(n=>n.starred):notes;
    const{search,tumor,scenario,theme,source,importance}=filters;
    if(search){const q=search.toLowerCase();list=list.filter(n=>[n.title,n.body,n.tags].join(' ').toLowerCase().includes(q));}
    if(tumor?.length)list=list.filter(n=>tumor.includes(n.tumor));
    if(scenario?.length)list=list.filter(n=>scenario.includes(n.scenario));
    if(theme?.length)list=list.filter(n=>theme.includes(n.theme));
    if(source?.length)list=list.filter(n=>source.includes(n.source));
    if(importance?.length)list=list.filter(n=>importance.includes(String(n.importance)));
    if(sortBy==='importance')list=[...list].sort((a,b)=>(b.importance||0)-(a.importance||0));
    else if(sortBy==='tumor')list=[...list].sort((a,b)=>(a.tumor||'').localeCompare(b.tumor||''));
    else list=[...list].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    return list;
  },[notes,filters,sortBy,view]);

  const toggle=(key,val)=>setFilters(f=>{const arr=f[key]||[];return{...f,[key]:arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]};});
  const isActive=(key,val)=>(filters[key]||[]).includes(val);
  const counts=useMemo(()=>{const c={};notes.forEach(n=>{if(n.tumor)c[n.tumor]=(c[n.tumor]||0)+1;});return c;},[notes]);
  const usedGroups=TUMOR_GROUPS.filter(g=>counts[g.id]);
  const hasFilters=Object.values(filters).some(v=>Array.isArray(v)?v.length:v);

  function FBtn({children,active,color,onClick}){return<button onClick={onClick} style={{width:'100%',display:'flex',alignItems:'center',gap:5,padding:'5px 12px',background:active?color+'15':'none',border:'none',textAlign:'left',borderLeft:active?`3px solid ${color}`:'3px solid transparent',fontSize:11,color:active?color:'#666',fontWeight:active?700:400,fontFamily:"'DM Mono',monospace"}}>{children}</button>;}
  function Sec({label,children}){const[o,setO]=useState(true);return<div style={{marginBottom:3}}>
    <button onClick={()=>setO(x=>!x)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'5px 12px',background:'none',border:'none'}}>
      <span style={{fontSize:9,fontWeight:700,color:'#aaa',letterSpacing:1.5,textTransform:'uppercase',fontFamily:"'DM Mono',monospace"}}>{label}</span>
      <span style={{fontSize:9,color:'#ccc'}}>{o?'▲':'▼'}</span>
    </button>
    {o&&<div style={{paddingBottom:4}}>{children}</div>}
  </div>;}

  return<div style={{display:'flex',flex:1,overflow:'hidden'}}>
    {/* Filter sidebar */}
    {(view==='list'||view==='starred')&&<aside className="sidebar" style={{width:190,background:'#fff',borderRight:'1.5px solid #e8e8e4',display:'flex',flexDirection:'column',flexShrink:0,overflowY:'auto',padding:'10px 0'}}>
      <div style={{padding:'0 10px 10px'}}><input value={filters.search||''} onChange={e=>setFilters(f=>({...f,search:e.target.value}))} placeholder="🔍 Buscar…" style={{width:'100%',padding:'7px 10px',border:'1.5px solid #e8e8e4',borderRadius:9,fontSize:12,background:'#fafaf8',color:'#333',fontFamily:"'DM Mono',monospace"}}/></div>
      <Sec label="Grupo Tumoral">
        {!usedGroups.length&&<div style={{fontSize:10,color:'#ccc',padding:'3px 12px',fontFamily:"'DM Mono',monospace"}}>Nenhuma nota ainda</div>}
        {usedGroups.map(g=><FBtn key={g.id} active={isActive('tumor',g.id)} color={g.color} onClick={()=>toggle('tumor',g.id)}>{g.emoji} {g.label} <span style={{marginLeft:'auto',fontSize:9,opacity:.6}}>{counts[g.id]}</span></FBtn>)}
      </Sec>
      <Sec label="Cenário">{SCENARIOS.map(s=><FBtn key={s} active={isActive('scenario',s)} color="#546E7A" onClick={()=>toggle('scenario',s)}>{s}</FBtn>)}</Sec>
      <Sec label="Tema">{THEMES.map(t=><FBtn key={t} active={isActive('theme',t)} color="#5C6BC0" onClick={()=>toggle('theme',t)}>{t}</FBtn>)}</Sec>
      <Sec label="Fonte">{SOURCES.map(s=><FBtn key={s.id} active={isActive('source',s.id)} color={s.color} onClick={()=>toggle('source',s.id)}>{s.emoji} {s.label}</FBtn>)}</Sec>
      <Sec label="Importância">{IMPORTANCE.map(i=><FBtn key={i.id} active={isActive('importance',String(i.id))} color={i.color} onClick={()=>toggle('importance',String(i.id))}>{i.label}</FBtn>)}</Sec>
      {hasFilters&&<div style={{padding:'8px 10px'}}><button onClick={()=>setFilters({})} style={{width:'100%',padding:'6px',background:'#FFEBEE',color:'#D32F2F',border:'none',borderRadius:8,fontSize:11,fontFamily:"'DM Mono',monospace"}}>× Limpar</button></div>}
    </aside>}

    <div style={{flex:1,overflowY:'auto',padding:'18px 20px'}}>
      {/* Toolbar notas */}
      <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:16,flexWrap:'wrap'}}>
        {[{id:'list',label:'📋 Todas'},{id:'starred',label:'★ Favoritas'},{id:'new',label:'+ Nova Nota'}].map(tab=><button key={tab.id} onClick={()=>{setView(tab.id);setEditing(null);}} style={{padding:'6px 12px',background:view===tab.id?'#1a1a2e':'#f0f0ec',color:view===tab.id?'#fff':'#666',border:'none',borderRadius:20,fontSize:11,fontFamily:"'DM Mono',monospace",fontWeight:view===tab.id?700:400}}>{tab.label}</button>)}
        <div style={{flex:1}}/>
        {[{id:'date',l:'Data'},{id:'importance',l:'Importância'},{id:'tumor',l:'Grupo'}].map(s=><button key={s.id} onClick={()=>setSortBy(s.id)} style={{padding:'4px 9px',borderRadius:20,border:'none',fontSize:10,background:sortBy===s.id?'#1a1a2e':'#f0f0ec',color:sortBy===s.id?'#fff':'#888',fontFamily:"'DM Mono',monospace"}}>{s.l}</button>)}
        <span style={{fontSize:11,color:'#bbb',fontFamily:"'DM Mono',monospace"}}>{filtered.length} nota{filtered.length!==1?'s':''}</span>
      </div>

      {(view==='new'||editing)&&<NoteForm initial={editing} onSave={saveNote} onCancel={()=>{setView('list');setEditing(null);}}/>}

      {(view==='list'||view==='starred')&&(
        filtered.length===0
          ?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'55vh'}}>
            <div style={{border:'2px dashed #ddd',borderRadius:20,padding:'36px 44px',textAlign:'center',background:'#fff'}}>
              <div style={{fontSize:44,marginBottom:12}}>📓</div>
              <div style={{fontSize:14,fontFamily:"'Lora',serif",color:'#555',marginBottom:8}}>{view==='starred'?'Nenhuma favorita':notes.length===0?'Caderno vazio':'Nenhuma nota encontrada'}</div>
              {notes.length===0&&<button onClick={()=>setView('new')} style={{marginTop:14,padding:'9px 22px',background:'#1a1a2e',color:'#fff',border:'none',borderRadius:9,fontSize:12,fontFamily:"'DM Mono',monospace"}}>+ Criar primeira nota</button>}
            </div>
          </div>
          :<div style={{maxWidth:820,margin:'0 auto'}}>
            {sortBy==='tumor'
              ?TUMOR_GROUPS.map(grp=>{const gn=filtered.filter(n=>n.tumor===grp.id);if(!gn.length)return null;return<div key={grp.id} style={{marginBottom:24}}>
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:10,paddingBottom:7,borderBottom:`2px solid ${grp.color}30`}}>
                  <span style={{fontSize:16}}>{grp.emoji}</span>
                  <span style={{fontSize:12,fontWeight:700,color:grp.color,letterSpacing:.5,fontFamily:"'DM Mono',monospace"}}>{grp.label.toUpperCase()}</span>
                  <span style={{fontSize:10,background:grp.color+'20',color:grp.color,borderRadius:20,padding:'1px 7px',fontFamily:"'DM Mono',monospace"}}>{gn.length}</span>
                </div>
                {gn.map(n=><NoteCard key={n.id} note={n} onEdit={n=>{setEditing(n);setView('edit');}} onDelete={deleteNote} onToggleStar={toggleStar}/>)}
              </div>;})
              :filtered.map(n=><NoteCard key={n.id} note={n} onEdit={n=>{setEditing(n);setView('edit');}} onDelete={deleteNote} onToggleStar={toggleStar}/>)
            }
          </div>
      )}
    </div>
  </div>;
}

        <label style={{fontSize:10,color:'#aaa',letterSpacing:1.5,textTransform:'uppercase',display:'block',marginBottom:12,fontFamily:"'DM Mono',monospace"}}>📦 Backup de Dados</label>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>

          <button onClick={()=>importRef.current?.click()} style={{padding:'9px 18px',background:'transparent',border:'1.5px solid #e8e8e4',borderRadius:8,fontSize:12,color:'#666',fontFamily:"'DM Mono',monospace"}}>↑ Importar backup</button>

      <div style={{background:'#fff',border:'1.5px solid #e8e8e4',borderRadius:14,padding:22}}>

            <div style={{fontSize:22,fontWeight:700,color:'#1a1a2e',fontFamily:"'DM Mono',monospace"}}>{s.val}</div>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
